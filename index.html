<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Mery</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
overflow:hidden;
flex-direction:column;
}

/* BOTON GIGANTE */
.botonCarta{
padding:30px 60px;
font-size:34px;
border:none;
border-radius:60px;
background:white;
color:#ff5e78;
cursor:pointer;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
margin-top:20px;
}

#carta{
display:none;
background:white;
color:#444;
padding:40px;
border-radius:20px;
max-width:600px;
box-shadow:0 25px 50px rgba(0,0,0,.25);
}

#texto{
font-size:28px;
line-height:1.1;
white-space:pre-wrap;
font-weight:500;
}

.corazon{
position:absolute;
color:white;
opacity:.2;
animation:flotar linear infinite;
}

@keyframes flotar{
from{ transform:translateY(100vh);}
to{ transform:translateY(-10vh);}
}
</style>
</head>

<body>

<div id="inicio">
<h1 style="font-size:48px;">Hola Mery 🤍</h1>

<button class="botonCarta" onclick="iniciar()">
Pulsa aquí para leer tu carta ❤️
</button>

<br><br>

<!-- MUSICA DENTRO DE LA WEB -->
<iframe width="300" height="170"
src="https://www.youtube.com/embed/04mfKJWDSzI"
title="On Melancholy Hill"
frameborder="0"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
</iframe>

</div>

<div id="carta">
<h1 style="color:#ff5e78;">Para ti</h1>
<p id="texto"></p>
<p style="margin-top:20px;font-style:italic;color:#999;">De mí, para ti ✨</p>
</div>

<script>

let mensaje = `Hola, estoy amándote. Mucho.
Siempre te amo. Siempre lo haré.
Mi alma estará contigo al lado para saber cuántas veces necesitarás más amor, y si te sientes sin fuerzas, piénsame.
Siempre estaremos juntos.
Te estaré viendo y pensando aunque no me veas. Porque mi amor es así, está en todos lados.
Te amo.`;

let i=0;

function escribir(){
if(i<mensaje.length){
document.getElementById("texto").innerHTML+=mensaje.charAt(i);
i++;
setTimeout(escribir,35);
}
}

function iniciar(){
document.getElementById("inicio").style.display="none";
document.getElementById("carta").style.display="block";
crearCorazones();
escribir();
}

function crearCorazones(){
for(let i=0;i<25;i++){
let c=document.createElement("div");
c.className="corazon";
c.innerHTML="🤍";
c.style.left=Math.random()*100+"vw";
c.style.animationDuration=(6+Math.random()*6)+"s";
c.style.fontSize=(12+Math.random()*30)+"px";
document.body.appendChild(c);
}
}

</script>

</body>
</html>
