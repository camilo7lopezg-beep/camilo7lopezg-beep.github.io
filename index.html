<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Mery</title>

<style>
body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

button{
padding:20px 40px;
font-size:22px;
border:none;
border-radius:50px;
background:white;
color:#ff5e78;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

#carta{
display:none;
background:white;
color:#444;
padding:40px;
border-radius:20px;
max-width:500px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
animation:fade 1.2s;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

h1{
color:#ff5e78;
}
</style>
</head>

<body>

<div id="inicio">
<h1>Hola Mery ❤️</h1>
<br>
<button onclick="mostrarCarta()">Pulsa aquí para leer tu carta</button>
</div>

<div id="carta">
<h1>Para ti</h1>

<p style="font-size:20px; line-height:1.6;">
Hola, estoy amándote.<br><br>
Espero que todo vaya muy bien y te sientas mejor.<br><br>
Te amo.
</p>

<p style="margin-top:30px; font-style:italic; color:#999;">
De mí, para ti ✨
</p>

</div>

<script>
function mostrarCarta(){
document.getElementById("inicio").style.display="none";
document.getElementById("carta").style.display="block";
}
</script>

</body>
</html>
