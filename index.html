<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
font-family:'Montserrat',sans-serif;
background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.55)),
url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1920&auto=format&fit=crop");
background-size:cover;
background-position:center;
overflow:hidden;
}

#inicio{
animation:fade 2s;
}

#inicio h1{
font-family:'Playfair Display',serif;
font-size:64px;
letter-spacing:2px;
margin-bottom:10px;
}

#inicio p{
font-size:22px;
opacity:.9;
}

#btn{
margin-top:35px;
font-size:22px;
padding:20px 50px;
border:none;
border-radius:60px;
background:white;
color:#e75480;
cursor:pointer;
box-shadow:0 20px 60px rgba(0,0,0,.4);
transition:.35s;
}

#btn:hover{
transform:scale(1.1);
box-shadow:0 25px 80px rgba(0,0,0,.5);
}

#carta{
display:none;
background:rgba(255,255,255,0.95);
color:#444;
padding:55px;
border-radius:22px;
max-width:650px;
box-shadow:0 30px 80px rgba(0,0,0,.6);
animation:fade 2s;
backdrop-filter:blur(8px);
}

#texto{
font-size:26px;
line-height:1.4;
white-space:pre-wrap;
font-family:'Playfair Display',serif;
}

.corazon{
position:absolute;
color:white;
opacity:.2;
animation:subir linear infinite;
}

@keyframes subir{
from{transform:translateY(100vh) scale(.6);}
to{transform:translateY(-10vh) scale(1.3);}
}

@keyframes fade{
from{opacity:0; transform:scale(.95);}
to{opacity:1; transform:scale(1);}
}

#player{
position:absolute;
width:0;
height:0;
border:0;
opacity:0;
}

</style>
</head>

<body>

<div id="inicio">
<h1>Hola Mery 🤍</h1>
<p>Pulsa aquí para leer tu carta</p>
<button id="btn" onclick="iniciar()">Abrir</button>
</div>

<div id="carta">
<div id="texto"></div>
<p style="margin-top:25px;color:#999;font-style:italic;">De mí, para ti 🤍</p>
</div>

<iframe id="player"
src="https://www.youtube.com/embed/B7iWKPAGNo0?autoplay=1&loop=1&playlist=B7iWKPAGNo0">
</iframe>

<script>

let mensaje = `Hola Mery, te amo. 🤍  
Se dice pronto, pero es un sentimiento único.  
No sabes lo bonito que es estar contigo.

Cometo errores, lo sé, y seguiré trabajando en mí toda la vida para hacerte la persona más feliz del mundo.

Estaré siempre contigo. 🤍

Te amo como nadie ha amado ni amará nunca.  
Quiero mis hijos contigo, y los hijos de mis hijos con tu apellido en su genealogía.

Tengo seguras muchas cosas en esta vida, y una de ellas es que vamos a pasar todo, y estaremos para siempre el uno para el otro.

Para la eternidad, hasta que la muerte…

No…

Para la eternidad, y punto. 🤍

Te amo.  
Te amaré.

Espero te haya gustado la canción.  
Me gusta, apenas la escuché te imaginé a ti.

De mí, para ti. 🤍`;

let i=0;

function escribir(){
if(i<mensaje.length){
document.getElementById("texto").innerHTML+=mensaje.charAt(i);
i++;
setTimeout(escribir,40);
}
}

function iniciar(){

document.getElementById("inicio").style.display="none";
document.getElementById("carta").style.display="block";

document.getElementById("player").src += "";

for(let i=0;i<35;i++){
let c=document.createElement("div");
c.className="corazon";
c.innerHTML="🤍";
c.style.left=Math.random()*100+"vw";
c.style.animationDuration=(6+Math.random()*8)+"s";
c.style.fontSize=(15+Math.random()*35)+"px";
document.body.appendChild(c);
}

escribir();

}

</script>

</body>
</html>
