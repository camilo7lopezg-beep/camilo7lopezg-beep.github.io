<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Mery</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
color:white;
overflow:hidden;
}

#playBtn{
font-size:60px;
background:white;
color:#ff5e78;
border:none;
border-radius:100px;
width:120px;
height:120px;
cursor:pointer;
box-shadow:0 20px 50px rgba(0,0,0,.3);
}

#mensajeArriba{
font-size:34px;
margin-bottom:20px;
}

#carta{
display:none;
background:white;
color:#444;
padding:40px;
border-radius:20px;
max-width:620px;
box-shadow:0 25px 60px rgba(0,0,0,.3);
margin-top:30px;
}

#texto{
font-size:28px;
line-height:1.1;
white-space:pre-wrap;
font-weight:500;
}

.corazon{
position:absolute;
color:white;
opacity:.2;
animation:flotar linear infinite;
}

@keyframes flotar{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<div id="mensajeArriba">
Mery… toca para escuchar y leer tu carta 🤍
</div>

<button id="playBtn" onclick="iniciar()">▶</button>

<div id="player" style="margin-top:20px;"></div>

<div id="carta">
<h1 style="color:#ff5e78;">Para ti</h1>
<p id="texto"></p>
<p style="margin-top:20px;font-style:italic;color:#999;">De mí, para ti ✨</p>
</div>

<script>

let mensaje = `Hola, estoy amándote. Mucho.
Siempre te amo. Siempre lo haré.
Mi alma estará contigo al lado para saber cuántas veces necesitarás más amor, y si te sientes sin fuerzas, piénsame.
Siempre estaremos juntos.
Te estaré viendo y pensando aunque no me veas. Porque mi amor es así, está en todos lados.
Te amo.`;

let i=0;

function escribir(){
if(i<mensaje.length){
document.getElementById("texto").innerHTML+=mensaje.charAt(i);
i++;
setTimeout(escribir,35);
}
}

function iniciar(){

// mostrar carta
document.getElementById("carta").style.display="block";

// crear corazones
for(let i=0;i<25;i++){
let c=document.createElement("div");
c.className="corazon";
c.innerHTML="🤍";
c.style.left=Math.random()*100+"vw";
c.style.animationDuration=(6+Math.random()*6)+"s";
c.style.fontSize=(12+Math.random()*30)+"px";
document.body.appendChild(c);
}

// escribir texto
escribir();

// cargar musica
document.getElementById("player").innerHTML =
'<iframe width="320" height="180" src="https://www.youtube.com/embed/04mfKJWDSzI?autoplay=1&loop=1&playlist=04mfKJWDSzI" frameborder="0" allow="autoplay"></iframe>';

}

</script>

</body>
</html>
