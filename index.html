<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Mery</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
overflow:hidden;
}

button{
padding:18px 35px;
font-size:22px;
border:none;
border-radius:50px;
background:white;
color:#ff5e78;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
margin:8px;
}

#carta{
display:none;
background:white;
color:#444;
padding:40px;
border-radius:20px;
max-width:520px;
box-shadow:0 25px 50px rgba(0,0,0,.25);
}

h1{ color:#ff5e78; }

#texto{
font-size:26px;
line-height:1;
white-space:pre-wrap;
font-weight:500;
}

.corazon{
position:absolute;
color:white;
opacity:.25;
animation:flotar linear infinite;
}

@keyframes flotar{
from{ transform:translateY(100vh); }
to{ transform:translateY(-10vh); }
}
</style>
</head>

<body>

<div id="inicio">
<h1>Hola Mery 🤍</h1>

<button onclick="iniciar()">Leer tu carta ❤️</button>
<br>
<button onclick="musica()">Bailemos 💃</button>

</div>

<div id="carta">
<h1>Para ti</h1>
<p id="texto"></p>
<p style="margin-top:20px;font-style:italic;color:#999;">De mí, para ti ✨</p>
</div>

<script>

let mensaje = `Hola, estoy amándote. Mucho.
Siempre te amo. Siempre lo haré.
Mi alma estará contigo al lado para saber cuántas veces necesitarás más amor, y si te sientes sin fuerzas, piénsame.
Siempre estaremos juntos.
Te estaré viendo y pensando aunque no me veas. Porque mi amor es así, está en todos lados.
Te amo.`;

let i=0;

function escribir(){
if(i<mensaje.length){
document.getElementById("texto").innerHTML+=mensaje.charAt(i);
i++;
setTimeout(escribir,35);
}
}

function iniciar(){
document.getElementById("inicio").style.display="none";
document.getElementById("carta").style.display="block";
crearCorazones();
escribir();
}

function musica(){
window.open("https://www.youtube.com/watch?v=04mfKJWDSzI","_blank");
}

function crearCorazones(){
for(let i=0;i<20;i++){
let c=document.createElement("div");
c.className="corazon";
c.innerHTML="🤍";
c.style.left=Math.random()*100+"vw";
c.style.animationDuration=(6+Math.random()*6)+"s";
c.style.fontSize=(12+Math.random()*28)+"px";
document.body.appendChild(c);
}
}

</script>

</body>
</html>
