<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Montserrat:wght@300&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
font-family:'Montserrat',sans-serif;
background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1920&auto=format&fit=crop");
background-size:cover;
background-position:center;
overflow:hidden;
}

#inicio{
animation:fade 2s;
}

#inicio h1{
font-family:'Playfair Display',serif;
font-size:60px;
margin-bottom:10px;
letter-spacing:2px;
}

#inicio p{
font-size:24px;
opacity:.9;
}

#btn{
margin-top:30px;
font-size:22px;
padding:20px 45px;
border:none;
border-radius:60px;
background:white;
color:#e75480;
cursor:pointer;
box-shadow:0 20px 50px rgba(0,0,0,.4);
transition:.3s;
}

#btn:hover{
transform:scale(1.08);
}

#carta{
display:none;
background:white;
color:#444;
padding:45px;
border-radius:20px;
max-width:650px;
box-shadow:0 25px 70px rgba(0,0,0,.5);
animation:fade 2s;
}

#texto{
font-size:26px;
line-height:1.25;
white-space:pre-wrap;
font-family:'Playfair Display',serif;
}

.corazon{
position:absolute;
color:white;
opacity:.15;
animation:subir linear infinite;
}

@keyframes subir{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

</style>
</head>

<body>

<div id="inicio">
<h1>Hola Mery 🤍</h1>
<p>Pulsa aquí para leer tu carta</p>
<button id="btn" onclick="iniciar()">Abrir</button>
</div>

<div id="carta">
<div id="texto"></div>
<p style="margin-top:25px;color:#999;font-style:italic;">De mí, para ti ✨</p>
</div>

<!-- AUDIO OCULTO -->
<audio id="musica" preload="auto">
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>

let mensaje = `Hola, estoy amándote. Mucho.
Siempre te amo. Siempre lo haré.
Mi alma estará contigo al lado para saber cuántas veces necesitarás más amor, y si te sientes sin fuerzas, piénsame.
Siempre estaremos juntos.
Te estaré viendo y pensando aunque no me veas. Porque mi amor es así, está en todos lados.
Te amo.`;

let i=0;

function escribir(){
if(i<mensaje.length){
document.getElementById("texto").innerHTML+=mensaje.charAt(i);
i++;
setTimeout(escribir,38);
}
}

function iniciar(){

document.getElementById("inicio").style.display="none";
document.getElementById("carta").style.display="block";

// reproducir música oculta
document.getElementById("musica").play();

// corazones flotando
for(let i=0;i<20;i++){
let c=document.createElement("div");
c.className="corazon";
c.innerHTML="🤍";
c.style.left=Math.random()*100+"vw";
c.style.animationDuration=(7+Math.random()*6)+"s";
c.style.fontSize=(14+Math.random()*28)+"px";
document.body.appendChild(c);
}

escribir();
}

</script>

</body>
</html>
